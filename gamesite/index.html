<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
<script>

// games lol games games

let statusMessage = document.getElementById('status');

async function initialFetch() {
    const location = "/backend/index.json";
    try {
        const resp = await fetch(location);
        if (!resp.ok) throw new Error(`Resp failed! ${resp.status}`);
        const result = await resp.json();
        load(result);
    } catch (error) {
        console.log(error.message);
    }
}

async function load(result) {
    const apps = document.getElementById("applications");
    result.forEach(element => {
        let div = document.createElement("div");
        div.classList.add("app")

        let img = document.createElement("img");
        img.src = element.img;
        div.appendChild(img);

        let title = document.createElement("h1");
        title.innerHTML = element.title;
        div.appendChild(title);
		div.onclick = async function() {
			console.log("hello world");
			const win = window.open();
			if (win) {
				const resp = await fetch(element.url);
				if (!resp.ok) throw new Error(`Downloading site failed! ${resp.status}`);
				const result = await resp.text();
				
				win.document.open();
				win.document.write(`
                    <base href="${element.base}" target="_blank"> 
                `);
				win.document.write(result);
				win.document.close();
			}
		}
		
        apps.appendChild(div);

		
	});
}

  
initialFetch()

</script>

<div id="applications">

</div>

</body>
</html>
